services:
  # Backend API
  - type: web
    name: siliconseal-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: cd src && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.12"
      - key: APP_NAME
        value: "SiliconSeal - AOI IC Verification"
      - key: APP_VERSION
        value: "1.0.0"
      - key: DEBUG
        value: "False"
      - key: CORS_ORIGINS
        sync: false
      - key: YOLO_MODEL_PATH
        value: "https://github.com/ultralytics/assets/releases/download/v0.0.0/yolov8n.pt"
      - key: YOLO_CONFIDENCE
        value: "0.25"
      - key: YOLO_DEVICE
        value: "cpu"
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: "HS256"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: ADMIN_USERNAME
        value: "admin"
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
      - key: MAX_BATCH_FILES
        value: "20"
      - key: MOUSER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AI_MODEL
        value: "llama-3.3-70b-versatile"
      - key: AI_ENABLED
        value: "True"

  # Frontend (static site)
  - type: web
    name: siliconseal
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
